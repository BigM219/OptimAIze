services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: optimaize-ocr-api:local
    environment:
      OPTIMAIZE_OCR_OUTPUT_DIR: /app/runtime/outputs
      OPTIMAIZE_OCR_UPLOAD_DIR: /app/runtime/uploads
      OPTIMAIZE_OCR_HISTORY_DB: /app/runtime/history/history.sqlite3
      OPTIMAIZE_OCR_CORS_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      NUMEXPR_NUM_THREADS: "4"
      TORCH_NUM_THREADS: "4"
    volumes:
      - ocr-runtime:/app/runtime
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "3.75"
          memory: 3840M
    cpus: 3.75
    mem_limit: 3840m

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: optimaize-ocr-web:local
    depends_on:
      - api
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    cpus: 0.25
    mem_limit: 256m

volumes:
  ocr-runtime:
